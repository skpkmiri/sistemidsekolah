<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Direktori ID DELIMa</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- Memuatkan PapaParse untuk membaca pautan CSV secara 'live' -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="bg-gray-50 font-sans text-gray-800">
  
  <div id="app"></div>

  <script>
    // Data senarai murid kini diambil secara "live" dari Google Sheets (CSV)
    let mockStudents = [];
    const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSAGfWH36PmioZyxPamAqyf2Xm8gFeZiuiPhI5YEdTCf_EQnDFOxdGCeSZOZi8vwEtoxgnAHeReBv2M/pub?gid=147486476&single=true&output=csv";

    Papa.parse(csvUrl, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results) {
        const data = results.data;
        if (data && data.length > 0) {
           mockStudents = data.map((row, index) => {
              const keys = Object.keys(row);
              // Fungsi pintar untuk mencari nama lajur (walaupun ejaan berubah sedikit di Google Sheets)
              const findKey = (keywords) => keys.find(k => keywords.some(kw => k.toLowerCase().includes(kw)));
              
              const nameKey = findKey(['nama', 'name', 'murid']) || keys[0];
              const classKey = findKey(['kelas', 'class', 'tahun']) || keys[1];
              const emailKey = findKey(['emel', 'email', 'delima', 'id']) || keys[2];
              const passKey = findKey(['kata', 'laluan', 'password', 'pass']) || keys[3];

              return {
                id: index + 1,
                name: row[nameKey] ? row[nameKey].trim() : "-",
                class: row[classKey] ? row[classKey].trim() : "-",
                email: row[emailKey] ? row[emailKey].trim() : "-",
                password: row[passKey] ? row[passKey].trim() : "-"
              };
           });
        }
        // Kemas kini paparan sekiranya guru sudah berada di dalam sistem
        if (typeof isLoggedIn !== 'undefined' && isLoggedIn && typeof renderStudentList === 'function') {
           renderStudentList();
        }
      },
      error: function(err) {
        console.error("Gagal memuat turun CSV:", err);
        alert("Ralat memuat turun senarai dari Google Sheets. Sila pastikan pautan CSV masih aktif.");
      }
    });

    let isLoggedIn = false;
    let searchQuery = "";
    
    // KOD AKSES TELAH DIKEMAS KINI DI SINI
    const SECRET_PIN = "YBA4112";

    const appContainer = document.getElementById('app');

    function showLogin() {
      appContainer.innerHTML = `
        <div class="min-h-screen bg-blue-50 flex items-center justify-center p-4">
          <div class="max-w-md w-full bg-white rounded-2xl shadow-xl p-8 space-y-6 border-t-4 border-blue-500">
            <div class="text-center">
              <div class="flex justify-center mb-4">
                <img src="logo.png" alt="Logo SKPK Miri" class="h-24 w-24 object-contain drop-shadow-sm" 
                  onerror="this.onerror=null; this.outerHTML='<div class=\\'bg-blue-100 p-4 rounded-full\\'><i data-lucide=\\'graduation-cap\\' class=\\'h-12 w-12 text-blue-600\\'></i></div>'">
              </div>
              <h1 class="text-2xl font-bold text-gray-800">Direktori ID DELIMa</h1>
              <p class="text-sm text-gray-500 mt-2">SK Pendidikan Khas Miri<br/>Akses khas untuk Guru dan Ibu Bapa sahaja.</p>
            </div>
            
            <form id="loginForm" class="space-y-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Kod Sekolah</label>
                <input type="password" id="pinInput" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors" placeholder="Masukkan kod sekolah" required>
              </div>
              
              <p id="loginError" class="text-red-500 text-sm hidden">Kod tidak sah. Sila cuba lagi.</p>
              
              <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors shadow-md flex justify-center items-center gap-2">
                Log Masuk <i data-lucide="check" class="h-5 w-5"></i>
              </button>
            </form>

            <div class="bg-yellow-50 rounded-lg p-4 flex gap-3 text-sm text-yellow-800">
              <i data-lucide="info" class="h-5 w-5 flex-shrink-0"></i>
              <p>Nota: Aplikasi ini mengandungi maklumat sensitif. Sila pastikan skrin anda tidak dilihat oleh pihak yang tidak berkenaan.</p>
            </div>
          </div>
        </div>
      `;
      lucide.createIcons();

      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const pin = document.getElementById('pinInput').value;
        if (pin === SECRET_PIN) {
          isLoggedIn = true;
          showDashboard();
        } else {
          document.getElementById('loginError').classList.remove('hidden');
        }
      });
    }

    function showDashboard() {
      appContainer.innerHTML = `
        <div class="min-h-screen bg-gray-50">
          <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <div class="flex items-center gap-3">
                <img src="logo.png" alt="Logo SKPK Miri" class="h-12 w-12 object-contain drop-shadow-sm" 
                  onerror="this.onerror=null; this.outerHTML='<div class=\\'bg-blue-600 p-2 rounded-lg\\'><i data-lucide=\\'graduation-cap\\' class=\\'h-6 w-6 text-white\\'></i></div>'">
                <div>
                  <h1 class="text-xl font-bold text-gray-800">Direktori ID DELIMa</h1>
                  <p class="text-xs text-gray-500">SK Pendidikan Khas Miri</p>
                </div>
              </div>
              <button id="logoutBtn" class="text-gray-500 hover:text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg transition-colors flex items-center gap-2 text-sm font-medium">
                <i data-lucide="log-out" class="h-4 w-4"></i> Log Keluar
              </button>
            </div>
          </header>

          <main class="max-w-5xl mx-auto px-4 py-8">
            <div class="bg-white rounded-xl shadow-sm p-2 mb-6 border border-gray-100 flex items-center focus-within:ring-2 focus-within:ring-blue-500 transition-all">
              <div class="pl-3 pr-2 text-gray-400">
                <i data-lucide="search" class="h-5 w-5"></i>
              </div>
              <input type="text" id="searchInput" placeholder="Cari nama murid atau nama kelas (Cth: PRA)..." class="w-full py-3 px-2 bg-transparent border-none focus:outline-none text-gray-700 placeholder-gray-400">
              <button id="clearSearchBtn" class="px-4 text-gray-400 hover:text-gray-600 hidden">✕</button>
            </div>
            
            <div id="studentList" class="space-y-4">
            </div>
          </main>
        </div>
      `;
      lucide.createIcons();

      document.getElementById('logoutBtn').addEventListener('click', () => {
        isLoggedIn = false;
        searchQuery = "";
        showLogin();
      });

      const searchInput = document.getElementById('searchInput');
      const clearSearchBtn = document.getElementById('clearSearchBtn');

      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        if (searchQuery) {
          clearSearchBtn.classList.remove('hidden');
        } else {
          clearSearchBtn.classList.add('hidden');
        }
        renderStudentList();
      });

      clearSearchBtn.addEventListener('click', () => {
        searchQuery = "";
        searchInput.value = "";
        clearSearchBtn.classList.add('hidden');
        renderStudentList();
      });

      renderStudentList();
    }

    function renderStudentList() {
      const listContainer = document.getElementById('studentList');
      
      // Tunjuk status memuat turun (loading) jika data CSV sedang diproses
      if (mockStudents.length === 0) {
        listContainer.innerHTML = `
          <div class="text-center py-12 bg-white rounded-xl border border-gray-200 border-dashed text-gray-500">
            <i data-lucide="loader-2" class="h-8 w-8 animate-spin mx-auto text-blue-500 mb-2"></i>
            <p>Menyemak data terkini dari pangkalan data...</p>
          </div>
        `;
        lucide.createIcons();
        return;
      }

      const filteredStudents = mockStudents.filter(student => 
        student.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        student.class.toLowerCase().includes(searchQuery.toLowerCase())
      );

      if (filteredStudents.length > 0) {
        let htmlContent = '';
        filteredStudents.forEach(student => {
          const classBadge = student.class !== "-" 
            ? `<span class="inline-block mt-1 px-3 py-1 bg-blue-100 text-blue-800 text-xs font-medium rounded-full">Kelas: ${student.class}</span>` 
            : '';

          htmlContent += `
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
              <div class="p-5 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                <div class="flex-1">
                  <h3 class="text-lg font-semibold text-gray-800">${student.name}</h3>
                  ${classBadge}
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                  <div class="bg-gray-50 rounded-lg p-3 border border-gray-200 flex-1 sm:w-64">
                    <p class="text-xs text-gray-500 font-medium mb-1">Emel (ID DELIMa)</p>
                    <div class="flex justify-between items-center gap-2">
                      <span class="font-mono text-sm text-gray-700 truncate">${student.email}</span>
                      <button onclick="copyToClipboard('${student.email}', this)" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md transition-colors" title="Salin Emel">
                        <i data-lucide="copy" class="h-4 w-4"></i>
                      </button>
                    </div>
                  </div>

                  <div class="bg-gray-50 rounded-lg p-3 border border-gray-200 flex-1 sm:w-64">
                    <p class="text-xs text-gray-500 font-medium mb-1">Kata Laluan</p>
                    <div class="flex justify-between items-center gap-2">
                      <span class="font-mono text-sm text-gray-700 truncate">${student.password}</span>
                      <button onclick="copyToClipboard('${student.password}', this)" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md transition-colors" title="Salin Kata Laluan">
                        <i data-lucide="copy" class="h-4 w-4"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        listContainer.innerHTML = htmlContent;
      } else {
        listContainer.innerHTML = `
          <div class="text-center py-12 bg-white rounded-xl border border-gray-200 border-dashed">
            <p class="text-gray-500">Tiada rekod murid dijumpai untuk carian "${searchQuery}"</p>
          </div>
        `;
      }
      lucide.createIcons();
    }

    window.copyToClipboard = function(text, btnElement) {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      try {
        document.execCommand('copy');
        const originalHtml = btnElement.innerHTML;
        btnElement.innerHTML = '<i data-lucide="check" class="h-4 w-4 text-green-600"></i>';
        lucide.createIcons();
        
        setTimeout(() => {
          btnElement.innerHTML = originalHtml;
          lucide.createIcons();
        }, 2000);
      } catch (err) {
        console.error('Gagal menyalin teks', err);
        alert('Gagal menyalin. Sila salin secara manual.');
      }
      document.body.removeChild(el);
    };

    showLogin();
  </script>
</body>
</html>
