    function showLogin() {

    function showDashboard() {

        <div class="min-h-screen bg-gray-50">
          <header class="bg-white shadow-sm sticky top-0 z-10">
            <div class="max-w-5xl mx-auto px-4 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">

                  <h1 class="text-xl font-bold text-gray-800">Direktori ID DELIMa</h1>
                  <p class="text-xs text-gray-500">SK Pendidikan Khas Miri</p>
                </div>
              </div>
              <button id="logoutBtn" class="text-gray-500 hover:text-red-600 hover:bg-red-50 px-4 py-2 rounded-lg transition-colors flex items-center gap-2 text-sm font-medium">
                <i data-lucide="log-out" class="h-4 w-4"></i> Log Keluar
              </button>
            </div>
          </header>

          <main class="max-w-5xl mx-auto px-4 py-8">
            <div class="bg-white rounded-xl shadow-sm p-2 mb-6 border border-gray-100 flex items-center focus-within:ring-2 focus-within:ring-blue-500 transition-all">
              <div class="pl-3 pr-2 text-gray-400">
                <i data-lucide="search" class="h-5 w-5"></i>
              </div>
              <input type="text" id="searchInput" placeholder="Cari nama murid atau nama kelas (Cth: PRA)..." class="w-full py-3 px-2 bg-transparent border-none focus:outline-none text-gray-700 placeholder-gray-400">
              <button id="clearSearchBtn" class="px-4 text-gray-400 hover:text-gray-600 hidden">✕</button>
            </div>
            
            <div id="studentList" class="space-y-4">
            </div>
          </main>
        </div>
      `;
      lucide.createIcons();

      document.getElementById('logoutBtn').addEventListener('click', () => {
        isLoggedIn = false;
        searchQuery = "";
        showLogin();
      });

      const searchInput = document.getElementById('searchInput');
      const clearSearchBtn = document.getElementById('clearSearchBtn');

      searchInput.addEventListener('input', (e) => {
        searchQuery = e.target.value;
        if (searchQuery) {
          clearSearchBtn.classList.remove('hidden');
        } else {
          clearSearchBtn.classList.add('hidden');
        }
        renderStudentList();
      });

      clearSearchBtn.addEventListener('click', () => {
        searchQuery = "";
        searchInput.value = "";
        clearSearchBtn.classList.add('hidden');
        renderStudentList();
      });

      renderStudentList();
    }

    function renderStudentList() {
      const listContainer = document.getElementById('studentList');
      
      const filteredStudents = mockStudents.filter(student => 
        student.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
        student.class.toLowerCase().includes(searchQuery.toLowerCase())
      );

      if (filteredStudents.length > 0) {
        let htmlContent = '';
        filteredStudents.forEach(student => {
          const classBadge = student.class !== "-" 
            ? `<span class="inline-block mt-1 px-3 py-1 bg-blue-100 text-blue-800 text-xs font-medium rounded-full">Kelas: ${student.class}</span>` 
            : '';

          htmlContent += `
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition-shadow">
              <div class="p-5 flex flex-col md:flex-row gap-4 items-start md:items-center justify-between">
                <div class="flex-1">
                  <h3 class="text-lg font-semibold text-gray-800">${student.name}</h3>
                  ${classBadge}
                </div>
                
                <div class="flex flex-col sm:flex-row gap-3 w-full md:w-auto">
                  <div class="bg-gray-50 rounded-lg p-3 border border-gray-200 flex-1 sm:w-64">
                    <p class="text-xs text-gray-500 font-medium mb-1">Emel (ID DELIMa)</p>
                    <div class="flex justify-between items-center gap-2">
                      <span class="font-mono text-sm text-gray-700 truncate">${student.email}</span>
                      <button onclick="copyToClipboard('${student.email}', this)" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md transition-colors" title="Salin Emel">
                        <i data-lucide="copy" class="h-4 w-4"></i>
                      </button>
                    </div>
                  </div>

                  <div class="bg-gray-50 rounded-lg p-3 border border-gray-200 flex-1 sm:w-64">
                    <p class="text-xs text-gray-500 font-medium mb-1">Kata Laluan</p>
                    <div class="flex justify-between items-center gap-2">
                      <span class="font-mono text-sm text-gray-700 truncate">${student.password}</span>
                      <button onclick="copyToClipboard('${student.password}', this)" class="p-1.5 text-blue-600 hover:bg-blue-100 rounded-md transition-colors" title="Salin Kata Laluan">
                        <i data-lucide="copy" class="h-4 w-4"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          `;
        });
        listContainer.innerHTML = htmlContent;
      } else {
        listContainer.innerHTML = `
          <div class="text-center py-12 bg-white rounded-xl border border-gray-200 border-dashed">
            <p class="text-gray-500">Tiada rekod murid dijumpai untuk carian "${searchQuery}"</p>
          </div>
        `;
      }
      lucide.createIcons();
    }

    window.copyToClipboard = function(text, btnElement) {
      const el = document.createElement('textarea');
      el.value = text;
      document.body.appendChild(el);
      el.select();
      try {
        document.execCommand('copy');
        const originalHtml = btnElement.innerHTML;
        btnElement.innerHTML = '<i data-lucide="check" class="h-4 w-4 text-green-600"></i>';
        lucide.createIcons();
        
        setTimeout(() => {
          btnElement.innerHTML = originalHtml;
          lucide.createIcons();
        }, 2000);
      } catch (err) {
        console.error('Gagal menyalin teks', err);
        alert('Gagal menyalin. Sila salin secara manual.');
      }
      document.body.removeChild(el);
    };

    showLogin();
